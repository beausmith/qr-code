<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    #app {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2rem;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: #111;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      margin-bottom: 1rem;
    }

    label { font-size: 0.875rem; font-weight: 500; color: #444; }

    select, input, textarea {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #111;
      background: #fff;
      transition: border-color 0.15s;
      outline: none;
    }

    select:focus, input:focus, textarea:focus { border-color: #6366f1; }

    textarea { resize: vertical; min-height: 80px; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    button {
      width: 100%;
      padding: 0.625rem;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.15s;
    }

    button:hover { background: #4f46e5; }

    .qr-output {
      margin-top: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    #qrcode svg { width: 256px; height: 256px; border-radius: 8px; }

    .download-buttons {
      display: flex;
      gap: 0.75rem;
    }

    .download-btn {
      background: #10b981;
      font-size: 0.9rem;
      width: auto;
      padding: 0.5rem 1.25rem;
      margin-top: 0;
    }

    .download-btn:hover { background: #059669; }

    .error { font-size: 0.85rem; color: #ef4444; margin-top: 0.25rem; }
  </style>
</head>
<body>
<div id="app">
  <h1>QR Code Generator</h1>

  <div class="field">
    <label for="type">Type</label>
    <select id="type" v-model="type" @change="reset">
      <option value="url">URL</option>
      <option value="text">Plain Text</option>
      <option value="vcard">Contact (vCard)</option>
      <option value="email">Email</option>
      <option value="phone">Phone Number</option>
      <option value="sms">SMS</option>
      <option value="wifi">WiFi Credentials</option>
    </select>
  </div>

  <!-- URL -->
  <template v-if="type === 'url'">
    <div class="field">
      <label>URL</label>
      <input v-model="f.url" type="url" placeholder="https://example.com" />
    </div>
  </template>

  <!-- Plain Text -->
  <template v-else-if="type === 'text'">
    <div class="field">
      <label>Text</label>
      <textarea v-model="f.text" placeholder="Enter any text…"></textarea>
    </div>
  </template>

  <!-- vCard -->
  <template v-else-if="type === 'vcard'">
    <div class="row">
      <div class="field"><label>First Name</label><input v-model="f.firstName" /></div>
      <div class="field"><label>Last Name</label><input v-model="f.lastName" /></div>
    </div>
    <div class="field"><label>Organization</label><input v-model="f.org" /></div>
    <div class="field"><label>Phone</label><input v-model="f.vcPhone" type="tel" /></div>
    <div class="field"><label>Email</label><input v-model="f.vcEmail" type="email" /></div>
    <div class="field"><label>Website</label><input v-model="f.vcUrl" type="url" placeholder="https://…" /></div>
  </template>

  <!-- Email -->
  <template v-else-if="type === 'email'">
    <div class="field"><label>To</label><input v-model="f.emailTo" type="email" placeholder="someone@example.com" /></div>
    <div class="field"><label>Subject</label><input v-model="f.emailSubject" /></div>
    <div class="field"><label>Body</label><textarea v-model="f.emailBody"></textarea></div>
  </template>

  <!-- Phone -->
  <template v-else-if="type === 'phone'">
    <div class="field">
      <label>Phone Number</label>
      <input v-model="f.phone" type="tel" placeholder="+15550001234" />
    </div>
  </template>

  <!-- SMS -->
  <template v-else-if="type === 'sms'">
    <div class="field"><label>Phone Number</label><input v-model="f.smsPhone" type="tel" placeholder="+15550001234" /></div>
    <div class="field"><label>Message (optional)</label><textarea v-model="f.smsBody"></textarea></div>
  </template>

  <!-- WiFi -->
  <template v-else-if="type === 'wifi'">
    <div class="field"><label>SSID (Network Name)</label><input v-model="f.ssid" /></div>
    <div class="field"><label>Password</label><input v-model="f.wifiPass" type="password" /></div>
    <div class="field">
      <label>Security</label>
      <select v-model="f.wifiSec">
        <option value="WPA">WPA/WPA2</option>
        <option value="WEP">WEP</option>
        <option value="">None</option>
      </select>
    </div>
    <div class="field" style="flex-direction:row;align-items:center;gap:.5rem">
      <input type="checkbox" id="hidden" v-model="f.wifiHidden" style="width:auto" />
      <label for="hidden" style="margin:0">Hidden network</label>
    </div>
  </template>

  <p v-if="error" class="error">{{ error }}</p>

  <button @click="generate">Generate QR Code</button>

  <div class="qr-output" v-show="generated">
    <div id="qrcode"></div>
    <div class="download-buttons">
      <button class="download-btn" @click="download">Download PNG</button>
      <button class="download-btn" @click="downloadSvg">Download SVG</button>
    </div>
  </div>
</div>

<script type="module">
import QRCode from 'https://esm.sh/qrcode@1.5.3';
const { createApp, reactive, ref, nextTick } = Vue;

createApp({
  setup() {
    const type = ref('url');
    const error = ref('');
    const generated = ref(false);
    const currentPayload = ref('');
    const currentSvg = ref('');

    const f = reactive({
      url: '', text: '',
      firstName: '', lastName: '', org: '', vcPhone: '', vcEmail: '', vcUrl: '',
      emailTo: '', emailSubject: '', emailBody: '',
      phone: '',
      smsPhone: '', smsBody: '',
      ssid: '', wifiPass: '', wifiSec: 'WPA', wifiHidden: false,
    });

    function reset() {
      error.value = '';
      generated.value = false;
      currentPayload.value = '';
      currentSvg.value = '';
    }

    function buildPayload() {
      switch (type.value) {
        case 'url':
          if (!f.url) return [null, 'Please enter a URL.'];
          return [f.url, null];
        case 'text':
          if (!f.text) return [null, 'Please enter some text.'];
          return [f.text, null];
        case 'vcard': {
          if (!f.firstName && !f.lastName) return [null, 'Please enter at least a name.'];
          const v = [
            'BEGIN:VCARD', 'VERSION:3.0',
            `N:${f.lastName};${f.firstName};;;`,
            `FN:${f.firstName} ${f.lastName}`.trim(),
            f.org        ? `ORG:${f.org}`             : '',
            f.vcPhone    ? `TEL:${f.vcPhone}`          : '',
            f.vcEmail    ? `EMAIL:${f.vcEmail}`        : '',
            f.vcUrl      ? `URL:${f.vcUrl}`            : '',
            'END:VCARD',
          ].filter(Boolean).join('\n');
          return [v, null];
        }
        case 'email':
          if (!f.emailTo) return [null, 'Please enter a recipient email.'];
          return [`mailto:${f.emailTo}?subject=${encodeURIComponent(f.emailSubject)}&body=${encodeURIComponent(f.emailBody)}`, null];
        case 'phone':
          if (!f.phone) return [null, 'Please enter a phone number.'];
          return [`tel:${f.phone}`, null];
        case 'sms':
          if (!f.smsPhone) return [null, 'Please enter a phone number.'];
          return [`smsto:${f.smsPhone}:${f.smsBody}`, null];
        case 'wifi':
          if (!f.ssid) return [null, 'Please enter the network name (SSID).'];
          return [`WIFI:T:${f.wifiSec};S:${f.ssid};P:${f.wifiPass};H:${f.wifiHidden ? 'true' : 'false'};;`, null];
        default:
          return [null, 'Unknown type.'];
      }
    }

    const QR_OPTS = {
      margin: 2,
      color: { dark: '#000000', light: '#ffffff' },
      errorCorrectionLevel: 'M',
    };

    async function generate() {
      error.value = '';
      const [payload, err] = buildPayload();
      if (err) { error.value = err; return; }

      const svg = await QRCode.toString(payload, { type: 'svg', ...QR_OPTS });
      currentPayload.value = payload;
      currentSvg.value = svg;
      generated.value = true;
      await nextTick();
      document.getElementById('qrcode').innerHTML = svg;
    }

    async function download() {
      if (!currentPayload.value) return;
      const dataUrl = await QRCode.toDataURL(currentPayload.value, { width: 256, ...QR_OPTS });
      const a = document.createElement('a');
      a.download = 'qrcode.png';
      a.href = dataUrl;
      a.click();
    }

    function downloadSvg() {
      if (!currentSvg.value) return;
      const blob = new Blob([currentSvg.value], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.download = 'qrcode.svg';
      a.href = url;
      a.click();
      URL.revokeObjectURL(url);
    }

    return { type, f, error, generated, reset, generate, download, downloadSvg };
  }
}).mount('#app');
</script>

</body>
</html>
